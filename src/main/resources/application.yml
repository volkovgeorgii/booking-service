spring:
  application:
    name: booking-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5433/booking_db
    username: booking
    password: booking
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 2000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 5000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
      jakarta:
        persistence:
          query:
            timeout: 5000

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 8

  cache:
    type: redis
    redis:
      time-to-live: 5000

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: booking_schema_history

server:
  tomcat:
    max-connections: 20000
    accept-count: 5000
    connection-timeout: 20000
    threads:
      max: 200
  compression:
    enabled: true
    mime-types: application/json

resilience4j:
  circuitbreaker:
    instances:
      redis-lock:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - com.obank.booking.exception.SeatUnavailableException
          - com.obank.booking.exception.InvalidStateException

logging:
  level:
    root: WARN
    com.obank.booking: INFO
    io.github.resilience4j: INFO
    com.zaxxer.hikari: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  health:
    circuitbreakers:
      enabled: true

booking:
  hold:
    duration-minutes: 10
  lock:
    ttl-ms: 10000
  expiry:
    check-interval-ms: 30000
